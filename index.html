<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Solution HUB</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
</head>

<body>
<div id="splash-screen">
    <div class="splash-content">

        <img src="image/icon-512.png" alt="Solution HUB Logo" class="splash-logo">

        <h1 class="splash-title">
            <span class="solution">Solution</span><span class="hub">HUB</span>
        </h1>

    </div>
</div>
<header>

<div class="logo">
<span class="white">Solution</span>
<span class="red">HUB</span>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Search videos...">
    <button id="searchBtn">⌕</button>
    <div id="searchBtnb"></div>
</div>
</header>

<main>

<div id="videos" class="videos"></div>

</main>
  <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js");
    });
}
  </script>
<script src="script.js"></script>
    <div id="install-popup" class="install-popup">

    <button id="close-install" class="install-close">✕</button>

    <img src="image/icon-192.png" alt="Solution HUB">

    <div class="install-content">
        <h3>Install Solution HUB</h3>
        <p>Get a faster app experience directly from your home screen.</p>
    </div>

    <button id="install-btn" class="install-btn">
        Install
    </button>

</div>
</body>
</html>
